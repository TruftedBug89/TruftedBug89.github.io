    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@graph": [
            {
                "@type": "WebApplication",
                "@id": "https://truftedbug89.github.io/#app",
                "name": "中文大师 — Chinese Master",
                "description": "Free Chinese learning tool with HSK 1-5 vocabulary, listening, reading, grammar, speaking, and spaced-repetition flashcards. Works offline.",
                "applicationCategory": "EducationalApplication",
                "operatingSystem": "Any",
                "browserRequirements": "Requires JavaScript",
                "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
                "author": { "@type": "Organization", "name": "中文大师" },
                "featureList": [
                    "HSK 1-5 vocabulary with 5000+ words",
                    "Listening comprehension exercises",
                    "Reading practice with passages",
                    "Grammar lessons and patterns",
                    "Speaking and pronunciation drills",
                    "Spaced repetition (SM-2 algorithm)",
                    "Adaptive placement test",
                    "Progress tracking with XP and streaks",
                    "Offline-first PWA installation",
                    "Multi-profile support"
                ],
                "aggregateRating": { "@type": "AggregateRating", "ratingValue": "5", "ratingCount": "1", "bestRating": "5", "worstRating": "1" }
            },
            {
                "@type": "FAQPage",
                "@id": "https://truftedbug89.github.io/#faq",
                "mainEntity": [
                    { "@type": "Question", "name": "Is Chinese Master free to use?", "acceptedAnswer": { "@type": "Answer", "text": "Yes, Chinese Master is completely free and open source. No accounts, no servers, no tracking unless you opt in." } },
                    { "@type": "Question", "name": "Does Chinese Master work offline?", "acceptedAnswer": { "@type": "Answer", "text": "Yes, it is a Progressive Web App (PWA). After your first visit, it caches all resources and works fully offline. You can install it on your device from your browser." } },
                    { "@type": "Question", "name": "What HSK levels does Chinese Master cover?", "acceptedAnswer": { "@type": "Answer", "text": "Chinese Master covers HSK 1 through HSK 5, with over 5000 vocabulary words, listening exercises, reading passages, grammar lessons, and speaking practice." } },
                    { "@type": "Question", "name": "Does Chinese Master track my progress?", "acceptedAnswer": { "@type": "Answer", "text": "Yes, all progress is stored locally on your device using browser storage. It includes XP, levels, daily streaks, achievements, and a spaced-repetition review system. You can export and import your progress as a JSON backup." } },
                    { "@type": "Question", "name": "Can I use Chinese Master on my phone?", "acceptedAnswer": { "@type": "Answer", "text": "Yes, Chinese Master is fully responsive and optimized for mobile. Install it as a PWA from your browser (Chrome, Edge, Safari) for a native app-like experience." } },
                    { "@type": "Question", "name": "How does the placement test work?", "acceptedAnswer": { "@type": "Answer", "text": "The placement test uses an adaptive algorithm that starts at HSK 2 and adjusts difficulty based on your answers. In about 20 questions across 5 minutes, it estimates your HSK level and recommends study materials." } }
                ]
            },
            {
                "@type": "BreadcrumbList",
                "@id": "https://truftedbug89.github.io/#breadcrumb",
                "itemListElement": [
                    { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://truftedbug89.github.io/" },
                    { "@type": "ListItem", "position": 2, "name": "Dashboard", "item": "https://truftedbug89.github.io/#dashboard" },
                    { "@type": "ListItem", "position": 3, "name": "Placement Test", "item": "https://truftedbug89.github.io/#placement" },
                    { "@type": "ListItem", "position": 4, "name": "Vocabulary", "item": "https://truftedbug89.github.io/#vocabulary" }
                ]
            }
        ]
    }
    </script>

    <style>
        #loading-screen {
            position: fixed; inset: 0; z-index: 99999;
            background: #0f172a;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 24px;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        #loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loading-logo {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 56px; font-weight: 700;
            background: linear-gradient(135deg, #e85555, #d94444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .loading-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 16px; color: #64748b;
            letter-spacing: 0.05em;
        }
        .loading-bar-track {
            width: 200px; height: 3px; background: #334155;
            border-radius: 9999px; overflow: hidden;
        }
        .loading-bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #e85555, #a78bfa);
            border-radius: 9999px;
            transition: width 0.3s ease;
        }
    </style>
